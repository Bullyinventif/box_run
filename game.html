<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Run</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#8fc4ef;
    image-rendering:pixelated;
}

body.shake{
    animation:shake 0.18s linear;
}

/* 🌄 BACKGROUND */
#background{
    position:fixed;
    inset:0;
    background:url("images/fond.png") center/cover no-repeat;
    z-index:-10;
}

#background::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(255,255,255,0.18), transparent 26%),
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.35), transparent 28%);
    pointer-events:none;
}

/* 🚚 TAPIS */
.belt{
    position:absolute;
    left:0;
    width:100%;
    height:140px;
    overflow:hidden;
    background: repeating-linear-gradient(
        90deg,
        #3f3f3f 0px,
        #3f3f3f 42px,
        #656565 42px,
        #656565 84px
    );
    background-size:84px 140px;
    border-top:5px solid #202020;
    border-bottom:5px solid #202020;
    box-shadow:inset 0 12px 0 rgba(255,255,255,0.08), inset 0 -12px 0 rgba(0,0,0,0.18);
    z-index:1;
    animation:beltMove 0.7s linear infinite;
}

#belt1{ top:250px; }
#belt2{ top:380px; }
#belt3{ top:510px; }

/* 📦 OBJETS */
.object{
    position:absolute;
    width:90px;
    height:90px;
    left:-120px;
    top:20px;
    cursor:pointer;
    object-fit:contain;
    z-index:10;
    user-select:none;
    -webkit-user-drag:none;
    transition:transform 0.1s ease, opacity 0.3s ease;
    will-change: left;
    backface-visibility: hidden;
    transform: translateZ(0);
    filter:drop-shadow(5px 7px 0 rgba(0,0,0,0.35));
    padding:10px;
}

.object:hover{
    transform:translateZ(0) scale(1.12);
}

.object.hit{
    filter:drop-shadow(0 0 12px #00ff88);
}

.object.wrong{
    filter:drop-shadow(0 0 12px #ff4444) saturate(0.5);
}

/* 📦 SCORE */
#score{
    position:absolute;
    top:15px;
    right:20px;
    font-size:44px;
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 0 black;
    z-index:1000;
    min-width:72px;
    padding:8px 18px;
    text-align:center;
    background:rgba(0,0,0,0.35);
    border:4px solid white;
    border-radius:8px;
    box-shadow:5px 5px 0 black;
    transition:transform 0.16s ease;
}

#homeButton{
    position:absolute;
    top:15px;
    left:20px;
    width:58px;
    height:58px;
    padding:0;
    font-size:30px;
    z-index:11000;
}

#score.pop{
    transform:scale(1.18) rotate(2deg);
}

/* 📦 BOÎTE */
#orderZone{
    position:absolute;
    top:8px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:9999;
    pointer-events:none;
    animation:boxIdle 1.4s ease-in-out infinite;
}

#orderBox{
    position:relative;
    width:210px;
    height:210px;
    filter:drop-shadow(0 12px 0 rgba(0,0,0,0.25));
}

#boxImg{
    width:100%;
    height:100%;
    position:absolute;
    z-index:1;
    object-fit:contain;
}

#orderImage{
    position:absolute;
    width:130px;
    height:130px;
    top:40px;
    left:40px;
    z-index:2;
}

/* 📢 MESSAGE */
#message{
    position:absolute;
    top:220px;
    width:100%;
    text-align:center;
    font-size:50px;
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 0 black;
    opacity:0;
    z-index:1000;
    pointer-events:none;
    transform:translateY(10px) scale(0.95);
    transition:opacity 0.18s ease, transform 0.18s ease;
}

#message.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

#instruction{
    position:absolute;
    top:50%;
    left:50%;
    text-align:center;
    font-size:90px;
    font-weight:bold;
    color:white;
    text-shadow:7px 7px 0 black;
    z-index:12000;
    pointer-events:none;
    opacity:0;
    white-space:nowrap;
    transform:translate(-50%,-50%) scale(0.65) rotate(-4deg);
    transition:opacity 0.2s ease, transform 0.35s cubic-bezier(.2,1.4,.4,1);
}

#instruction.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1) rotate(0deg);
}

#comboDisplay{
    position:absolute;
    top:86px;
    left:20px;
    text-align:left;
    font-size:34px;
    font-weight:bold;
    color:yellow;
    text-shadow:3px 3px 0 black;
    z-index:1000;
    opacity:0;
    transform:scale(0.9);
    transition:opacity 0.16s ease, transform 0.16s ease;
}

#comboDisplay.show{
    opacity:1;
    transform:scale(1);
}

#comboDisplay.pop{
    transform:scale(1.25) rotate(-4deg);
}

/* ❤️ VIES */
#lives{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    z-index:1000;
}

#lives img{
    width:60px;
    margin:5px;
    filter:drop-shadow(3px 5px 0 rgba(0,0,0,0.35));
}

.floatText{
    position:absolute;
    font-size:34px;
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 0 black;
    pointer-events:none;
    z-index:13000;
    animation:floatUp 0.55s ease-out forwards;
}

/* 💀 GAME OVER */
#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-size:40px;
    z-index:20000;
    text-align:center;
    gap:18px;
    text-shadow:4px 4px 0 black;
}

button{
    padding:14px 26px;
    font-size:22px;
    font-weight:bold;
    color:white;
    background:#ff6b35;
    border:4px solid white;
    border-radius:8px;
    box-shadow:5px 5px 0 black;
    cursor:pointer;
}

button:hover{
    transform:translateY(-2px);
}

@keyframes beltMove{
    from{ background-position-x:0; }
    to{ background-position-x:84px; }
}

@keyframes boxIdle{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
}

@keyframes floatUp{
    from{
        opacity:1;
        transform:translate(-50%,0) scale(0.85);
    }
    to{
        opacity:0;
        transform:translate(-50%,-55px) scale(1.2);
    }
}

@keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-8px); }
    50%{ transform:translateX(8px); }
    75%{ transform:translateX(-5px); }
}

@media (max-width:700px), (max-height:720px){
    .belt{
        height:112px;
    }

    #belt1{ top:230px; }
    #belt2{ top:338px; }
    #belt3{ top:446px; }

    .object{
        width:72px;
        height:72px;
        left:-90px;
    }

    #orderZone{
        top:4px;
    }

    #orderBox{
        width:150px;
        height:150px;
    }

    #orderImage{
        width:94px;
        height:94px;
        top:28px;
        left:28px;
    }

    #score{
        top:10px;
        right:10px;
        min-width:54px;
        padding:6px 12px;
        font-size:32px;
        border-width:3px;
        box-shadow:4px 4px 0 black;
    }

    #homeButton{
        top:10px;
        left:10px;
        width:48px;
        height:48px;
        font-size:26px;
        border-width:3px;
    }

    #comboDisplay{
        top:66px;
        left:12px;
        font-size:28px;
    }

    #message{
        top:160px;
        font-size:34px;
    }

    #instruction{
        width:100%;
        padding:0 12px;
        font-size:clamp(42px, 15vw, 74px);
        white-space:normal;
    }

    #lives{
        bottom:10px;
    }

    #lives img{
        width:44px;
        margin:3px;
    }

    .floatText{
        font-size:28px;
    }

    #gameOver{
        padding:20px;
        font-size:30px;
    }
}

@media (max-width:430px){
    #belt1{ top:218px; }
    #belt2{ top:326px; }
    #belt3{ top:434px; }

    #message{
        top:150px;
        font-size:30px;
    }

    #orderBox{
        width:136px;
        height:136px;
    }

    #orderImage{
        width:84px;
        height:84px;
        top:26px;
        left:26px;
    }
}

</style>
</head>

<body>

<div id="background"></div>

<button id="homeButton" onclick="window.location.href='index.html'">⌂</button>
<div id="score">0</div>

<div id="message"></div>
<div id="instruction">ATTRAPE !</div>
<div id="comboDisplay"></div>

<div id="lives"></div>

<div id="orderZone">
    <div id="orderBox">
        <img id="boxImg" src="images/box.png">
        <img id="orderImage">
    </div>
</div>

<div id="gameOver">
    <div>FIN DE SERVICE</div>
    <div id="finalScore"></div>
    <button onclick="location.reload()">Rejouer</button>
</div>

<div id="belt1" class="belt"></div>
<div id="belt2" class="belt"></div>
<div id="belt3" class="belt"></div>

<script>

/* 🎮 DATA */
const items = [
"apple_1.png",
"apple_2.png",
"apple_pie.png",
"bacon.png",
"burger.png",
"cookie.png",
"dragon_sword.png",
"emerald.png",
"star_collier.png",
"sword.png"
];

let score = 0;
let lives = 4;
let currentOrder;
let combo = 0;
let instructionTimeout;
let lastOrderSpawnTime = 0;
let messageTimeout;

/* DOM */
const orderImage = document.getElementById("orderImage");
const scoreDisplay = document.getElementById("score");
const message = document.getElementById("message");
const comboDisplay = document.getElementById("comboDisplay");
const instruction = document.getElementById("instruction");

/* 📦 MESSAGE */
function showMessage(text,color){
    clearTimeout(messageTimeout);

    message.innerText = text;
    message.style.color = color;
    message.classList.add("show");

    messageTimeout = setTimeout(()=>{
        message.classList.remove("show");
    },600);
}

function showInstruction(text){
    clearTimeout(instructionTimeout);

    instruction.innerText = text;
    instruction.classList.add("show");

    instructionTimeout = setTimeout(()=>{
        instruction.classList.remove("show");
    },900);
}

function pulseElement(element){
    element.classList.remove("pop");
    void element.offsetWidth;
    element.classList.add("pop");

    setTimeout(()=>{
        element.classList.remove("pop");
    },180);
}

function showFloatingText(text,x,y,color){
    const floatText = document.createElement("div");

    floatText.className = "floatText";
    floatText.innerText = text;
    floatText.style.left = x + "px";
    floatText.style.top = y + "px";
    floatText.style.color = color;

    document.body.appendChild(floatText);
    setTimeout(()=>floatText.remove(),600);
}

function shakeScreen(){
    document.body.classList.remove("shake");
    void document.body.offsetWidth;
    document.body.classList.add("shake");

    setTimeout(()=>{
        document.body.classList.remove("shake");
    },200);
}

/* 📦 NOUVELLE COMMANDE */
function newOrder(){
    currentOrder = items[Math.floor(Math.random()*items.length)];
    orderImage.src = "images/" + currentOrder;
    lastOrderSpawnTime = performance.now();

    showMessage(
        currentOrder.replace(".png","").toUpperCase(),
        "#ffffff"
    );
}

function boxBounce(){

    const box =
    document.getElementById("orderBox");

    box.style.transition =
    "transform 0.15s";

    box.style.transform =
    "scale(1.15)";

    setTimeout(()=>{
        box.style.transform =
        "scale(1)";
    },150);
}

/* 📦 VIES */
function updateLives(){
    const zone = document.getElementById("lives");
    zone.innerHTML = "";

    for(let i=0;i<lives;i++){
        const img = document.createElement("img");
        img.src = "images/box.png";
        zone.appendChild(img);
    }
}

/* 🎮 SPAWN */
function spawnObject(){

    const obj = document.createElement("img");

    const now = performance.now();
    const mustSpawnOrder = now - lastOrderSpawnTime >= 3000;
    const item = mustSpawnOrder
        ? currentOrder
        : items[Math.floor(Math.random()*items.length)];

    if(item === currentOrder){
        lastOrderSpawnTime = now;
    }

    obj.src = "images/" + item;

    obj.className = "object";
    obj.src = "images/" + item;

    obj.style.top = "20px";

    const belt = document.getElementById(
        ["belt1","belt2","belt3"][Math.floor(Math.random()*3)]
    );

    let x = window.innerWidth <= 700 ? -90 : -120;
    obj.style.left = x + "px";
    belt.appendChild(obj);

    const speed = score >= 6
        ? 3.8 + Math.min((score - 6) / 8, 6)
        : 2 + score / 10;

    obj.onload = ()=>{

        const move = setInterval(()=>{

            x += speed;

            obj.style.left = x + "px";

            if(x > window.innerWidth){

                obj.remove();
                clearInterval(move);
            }

        },16);

        obj.onclick = (event)=>{

            obj.onclick = null; // 🔥 empêche double clic bug
            clearInterval(move);

            if(item === currentOrder){

                score++;
                combo++;
                scoreDisplay.innerText = score;
                pulseElement(scoreDisplay);
                comboDisplay.innerText =
                "x" + combo;
                comboDisplay.classList.add("show");
                pulseElement(comboDisplay);

                showMessage("✔ GOOD","#00ff88");
                showFloatingText("+1",event.clientX,event.clientY,"#00ff88");
                boxBounce();

                if(combo % 5 === 0){
                    showInstruction("x" + combo + " Combo !");
                }

                if(score === 6){
                    showInstruction("PLUS VITE !");
                }

                document.body.style.filter = "brightness(1.5)";
                setTimeout(()=>{
                    document.body.style.filter = "brightness(1)";
                },80);

                obj.style.transition = "transform 0.2s ease, opacity 0.2s ease";
                obj.classList.add("hit");
                obj.style.transform = "scale(1.3)";
                obj.style.opacity = "0";

                setTimeout(()=>obj.remove(),200);

                newOrder();

            }else{

                combo = 0;
                comboDisplay.innerText = "";
                comboDisplay.classList.remove("show");

                lives--;
                updateLives();

                showMessage("✖ BOÎTE CASSÉE","#ff4444");
                showFloatingText("-1",event.clientX,event.clientY,"#ff4444");
                shakeScreen();

                obj.style.transition = "transform 0.16s ease, opacity 0.16s ease";
                obj.classList.add("wrong");
                obj.style.transform = "scale(0.75) rotate(-12deg)";
                obj.style.opacity = "0";

                setTimeout(()=>obj.remove(),160);

                if(lives <= 0){
                    document.getElementById("finalScore").innerText = score;
                    document.getElementById("gameOver").style.display = "flex";
                }
            }
        };
    };
}

/* 🔁 LOOP */
function loop(){
    spawnObject();

    let delay = 700;

    if(score >= 10) delay = 550;
    if(score > 25) delay = 550;
    if(score > 40) delay = 450;
    if(score > 65) delay = 350;
    if(score > 80) delay = 250;

    setTimeout(loop, delay);
}

/* 🚀 START */
window.onload = ()=>{

    newOrder();
    updateLives();
    showInstruction("ATTRAPE !");
    loop();

};

</script>

</body>
</html>
